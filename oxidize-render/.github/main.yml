name: Oxidize Render CI
on:
  push:
    branches:
      - main
    paths:
      - 'crates/oxidize-render/**'
  pull_request:
    branches:
      - main
    paths:
      - 'crates/oxidize-render/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - run: cargo test -p oxidize-render
