name: Oxidize HTML Engine CI

on:
  push:
    branches:
      - master
    paths:
      - 'crates/oxidize-html-engine/**'
  pull_request:
    branches:
      - master
    paths:
      - 'crates/oxidize-html-engine/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test -p oxidize-html-engine
