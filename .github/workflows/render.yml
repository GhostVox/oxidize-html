name: Oxidize Render CI

on:
  push:
    branches:
      - master
    paths:
      - 'oxidize-html-gpui/**'
  pull_request:
    branches:
      - master
    paths:
      - 'oxidize-html-gpui/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test -p oxidize-html-gpui
